<style>
    /* ============================================
       المتغيرات الجذرية - CSS Root Variables
       ============================================ */
    :root {
        /* الألوان الأساسية */
        --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        --primary-gradient-reverse: linear-gradient(135deg, #ec4899 0%, #a855f7 50%, #6366f1 100%);
        --secondary-gradient: linear-gradient(135deg, #14b8a6 0%, #06b6d4 50%, #3b82f6 100%);
        --dark-gradient: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
        --success-gradient: linear-gradient(135deg, #10b981 0%, #34d399 100%);
        --warning-gradient: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
        --danger-gradient: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        --info-gradient: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
        
        /* تأثيرات الزجاج */
        --glass-bg: rgba(255, 255, 255, 0.08);
        --glass-bg-light: rgba(255, 255, 255, 0.12);
        --glass-bg-dark: rgba(0, 0, 0, 0.2);
        --glass-border: rgba(255, 255, 255, 0.25);
        --glass-border-light: rgba(255, 255, 255, 0.4);
        --glass-border-dark: rgba(255, 255, 255, 0.1);
        --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        --glass-shadow-hover: 0 12px 40px 0 rgba(31, 38, 135, 0.5);
        
        /* الألوان النصية */
        --text-color: #ffffff;
        --text-color-primary: #ffffff;
        --text-color-secondary: rgba(255, 255, 255, 0.75);
        --text-color-tertiary: rgba(255, 255, 255, 0.55);
        --text-color-muted: rgba(255, 255, 255, 0.35);
        --text-color-dark: #0f172a;
        
        /* ألوان التمييز */
        --accent-color: #ec4899;
        --accent-color-light: #f472b6;
        --accent-color-dark: #db2777;
        --accent-glow: rgba(236, 72, 153, 0.4);
        --accent-glow-strong: rgba(236, 72, 153, 0.6);
        
        /* ألوان إضافية */
        --indigo: #6366f1;
        --purple: #a855f7;
        --pink: #ec4899;
        --cyan: #06b6d4;
        --teal: #14b8a6;
        --blue: #3b82f6;
        --green: #10b981;
        --yellow: #f59e0b;
        --orange: #f97316;        --red: #ef4444;
        
        /* التوهجات والتأثيرات */
        --hover-glow: rgba(236, 72, 153, 0.4);
        --glow-indigo: rgba(99, 102, 241, 0.4);
        --glow-purple: rgba(168, 85, 247, 0.4);
        --glow-cyan: rgba(6, 182, 212, 0.4);
        --glow-teal: rgba(20, 184, 166, 0.4);
        
        /* الظلال */
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        --shadow-glow: 0 0 30px rgba(236, 72, 153, 0.5);
        --shadow-glow-lg: 0 0 50px rgba(236, 72, 153, 0.6);
        
        /* الحدود */
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 20px;
        --radius-xl: 30px;
        --radius-2xl: 40px;
        --radius-full: 9999px;
        
        /* التحولات والحركات */
        --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        
        /* المسافات */
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-xl: 32px;
        --spacing-2xl: 48px;
        --spacing-3xl: 64px;
        
        /* الخطوط */
        --font-family-base: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-family-display: 'Plus Jakarta Sans', 'Cairo', sans-serif;
        --font-size-xs: 0.75rem;
        --font-size-sm: 0.875rem;
        --font-size-base: 1rem;
        --font-size-lg: 1.125rem;
        --font-size-xl: 1.25rem;
        --font-size-2xl: 1.5rem;        --font-size-3xl: 2rem;
        --font-size-4xl: 2.5rem;
        --font-size-5xl: 3.5rem;
        
        /* z-index levels */
        --z-dropdown: 1000;
        --z-sticky: 1020;
        --z-fixed: 1030;
        --z-modal-backdrop: 1040;
        --z-modal: 1050;
        --z-popover: 1060;
        --z-tooltip: 1070;
        --z-toast: 1080;
    }

    /* ============================================
       إعادة التعيين والأساسيات - Reset & Base
       ============================================ */
    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    * {
        transition: all var(--transition-base);
        scroll-behavior: smooth;
    }

    html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
    }

    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: var(--font-family-base);
        overflow-x: hidden;
        background: #0f172a;
        line-height: 1.6;
    }

    /* تخصيص شريط التمرير */
    ::-webkit-scrollbar {
        width: 12px;        height: 12px;
    }

    ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
        border-radius: 10px;
        border: 2px solid rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(135deg, #a855f7, #ec4899, #f472b6);
    }

    ::-webkit-scrollbar-corner {
        background: rgba(255, 255, 255, 0.05);
    }

    /* تحديد النص */
    ::selection {
        background: rgba(236, 72, 153, 0.3);
        color: #fff;
        text-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
    }

    /* ============================================
       الخلفية المتحركة - Animated Background
       ============================================ */
    .animated-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b, #4c1d95, #581c87);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        z-index: -1;
    }

    .animated-bg::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;        height: 100%;
        background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 40% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
        animation: floatBlobs 20s ease-in-out infinite;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        25% { background-position: 50% 100%; }
        50% { background-position: 100% 50%; }
        75% { background-position: 50% 0%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes floatBlobs {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* تأثيرات الجزيئات */
    .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: -1;
        pointer-events: none;
    }

    .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        animation: particleFloat 15s infinite;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
    .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 14s; }
    .particle:nth-child(3) { left: 30%; animation-delay: 4s; animation-duration: 16s; }
    .particle:nth-child(4) { left: 40%; animation-delay: 1s; animation-duration: 13s; }
    .particle:nth-child(5) { left: 50%; animation-delay: 3s; animation-duration: 15s; }
    .particle:nth-child(6) { left: 60%; animation-delay: 5s; animation-duration: 17s; }
    .particle:nth-child(7) { left: 70%; animation-delay: 2s; animation-duration: 11s; }    .particle:nth-child(8) { left: 80%; animation-delay: 4s; animation-duration: 14s; }
    .particle:nth-child(9) { left: 90%; animation-delay: 1s; animation-duration: 16s; }
    .particle:nth-child(10) { left: 15%; animation-delay: 3s; animation-duration: 13s; }

    @keyframes particleFloat {
        0% {
            transform: translateY(100vh) rotate(0deg);
            opacity: 0;
        }
        10% {
            opacity: 1;
        }
        90% {
            opacity: 1;
        }
        100% {
            transform: translateY(-100vh) rotate(720deg);
            opacity: 0;
        }
    }

    /* ============================================
       شاشة الترحيب - Splash Screen
       ============================================ */
    #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 1.5s ease, visibility 1.5s;
        overflow: hidden;
    }

    #splash-screen::before {
        content: '';
        position: absolute;
        width: 200%;
        height: 200%;
        background: conic-gradient(from 0deg, transparent, #6366f1, #a855f7, #ec4899, transparent);
        animation: rotateSplash 4s linear infinite;
        opacity: 0.3;
    }

    #splash-screen.hide {        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .welcome-text {
        font-size: 5rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: 10px;
        text-transform: uppercase;
        animation: pulseFade 3s ease-in-out infinite;
        font-family: var(--font-family-display);
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 10px #fff, 0 0 20px #6366f1, 0 0 40px #a855f7;
        position: relative;
        z-index: 1;
    }

    .welcome-text::after {
        content: attr(data-text);
        position: absolute;
        left: 0;
        top: 0;
        z-index: -1;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: blur(20px);
        opacity: 0.5;
    }

    @keyframes pulseFade {
        0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(10px); }
        20% { opacity: 1; transform: scale(1.05) translateY(0); filter: blur(0); }
        40% { opacity: 1; transform: scale(1.1) translateY(-10px); filter: blur(0); }
        60% { opacity: 1; transform: scale(1.05) translateY(0); filter: blur(0); }
        80% { opacity: 0.8; transform: scale(1.15) translateY(10px); filter: blur(5px); }
        100% { opacity: 0; transform: scale(1.2) translateY(20px); filter: blur(20px); }
    }

    @keyframes rotateSplash {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    /* ============================================
       المحتوى الرئيسي - Main Content
       ============================================ */
    .main-wrapper {
        opacity: 0;
        transform: translateY(30px);
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        position: relative;
    }

    .main-wrapper.content-active {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 1s ease, transform 1s ease;
    }

    /* ============================================
       الكارت الزجاجي المتقدم - Glass Card
       ============================================ */
    .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-radius: 30px;
        padding: 50px;
        width: 100%;
        max-width: 800px;
        box-shadow: var(--shadow-2xl);
        text-align: center;
        position: relative;
        overflow: hidden;
        isolation: isolate;
    }

    .glass-card::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(from 0deg, transparent, #6366f1, #a855f7, #ec4899, transparent);
        animation: rotateGradient 8s linear infinite;
        opacity: 0.1;
        pointer-events: none;        z-index: -1;
    }

    .glass-card::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.1), transparent 70%);
        pointer-events: none;
        z-index: -1;
    }

    @keyframes rotateGradient {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .glass-card:hover {
        border-color: var(--glass-border-light);
        box-shadow: var(--shadow-glow-lg), 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        transform: translateY(-5px);
    }

    /* ============================================
       العناوين - Headings
       ============================================ */
    h1.logo-title {
        font-size: 2.5rem;
        color: #fff;
        margin-bottom: 10px;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
        font-weight: 800;
        letter-spacing: 1px;
        position: relative;
        display: inline-block;
    }

    h1.logo-title::after {
        content: '';
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);        width: 60%;
        height: 4px;
        background: var(--primary-gradient);
        border-radius: 2px;
        box-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
    }

    h2 {
        font-size: 2rem;
        color: var(--text-color-primary);
        margin-bottom: 20px;
        font-weight: 700;
    }

    h3 {
        font-size: 1.5rem;
        color: var(--text-color-primary);
        margin-bottom: 15px;
        font-weight: 600;
    }

    p.tagline {
        color: var(--text-color-secondary);
        margin-bottom: 40px;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
        line-height: 1.8;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
    }

    /* ============================================
       صندوق البحث - Search Container
       ============================================ */
    .search-container {
        position: relative;
        margin-bottom: 30px;
        width: 100%;
    }

    .search-container::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: var(--primary-gradient);
        border-radius: 27px;        z-index: -1;
        opacity: 0;
        transition: opacity 0.3s;
        filter: blur(10px);
    }

    .search-container:focus-within::before {
        opacity: 0.5;
        animation: borderPulse 2s ease-in-out infinite;
    }

    @keyframes borderPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 0.8; }
    }

    input[type="text"],
    input[type="search"],
    input[type="email"],
    input[type="password"] {
        width: 100%;
        padding: 20px 30px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid var(--glass-border);
        border-radius: 25px;
        color: #fff;
        font-size: 1.2rem;
        outline: none;
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
        transition: all 0.3s;
        font-family: inherit;
    }

    input[type="text"]::placeholder,
    input[type="search"]::placeholder {
        color: var(--text-color-tertiary);
    }

    input[type="text"]:focus,
    input[type="search"]:focus {
        background: rgba(255, 255, 255, 0.12);
        border-color: #a855f7;
        box-shadow: 0 0 25px rgba(168, 85, 247, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.1);
        transform: scale(1.02);
    }

    input[type="text"]:hover,
    input[type="search"]:hover {
        border-color: var(--glass-border-light);
        background: rgba(255, 255, 255, 0.08);    }

    /* أيقونة البحث */
    .search-icon {
        position: absolute;
        right: 25px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-color-tertiary);
        font-size: 1.5rem;
        pointer-events: none;
        transition: all 0.3s;
    }

    .search-container:focus-within .search-icon {
        color: var(--accent-color);
        transform: translateY(-50%) scale(1.1);
    }

    /* زر البحث */
    .search-btn {
        margin-top: 20px;
        width: 100%;
        padding: 18px 30px;
        background: var(--primary-gradient);
        border: none;
        border-radius: 25px;
        color: #fff;
        font-weight: 700;
        font-size: 1.2rem;
        cursor: pointer;
        box-shadow: 0 10px 25px -5px var(--hover-glow);
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
        font-family: inherit;
    }

    .search-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s;
    }

    .search-btn:hover::before {        left: 100%;
    }

    .search-btn:hover {
        transform: translateY(-3px) scale(1.02);
        filter: brightness(1.2);
        box-shadow: 0 15px 40px -5px var(--hover-glow), 0 0 20px rgba(236, 72, 153, 0.4);
    }

    .search-btn:active {
        transform: translateY(-1px) scale(0.98);
    }

    .search-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    /* ============================================
       النتائج - Results Section
       ============================================ */
    .result-box {
        display: none;
        margin-top: 40px;
        text-align: right;
        animation: fadeIn 0.8s ease;
        width: 100%;
    }

    .result-box.active {
        display: block;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .result-item {
        background: rgba(255, 255, 255, 0.07);
        padding: 25px;
        border-radius: 20px;
        border-right: 5px solid var(--accent-color);
        margin-bottom: 25px;
        box-shadow: var(--shadow-lg);
        position: relative;
        overflow: hidden;
        transition: all 0.3s;
        backdrop-filter: blur(10px);        border: 1px solid var(--glass-border-dark);
    }

    .result-item::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(236, 72, 153, 0.1), transparent);
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
    }

    .result-item:hover::before {
        opacity: 1;
    }

    .result-item:hover {
        transform: translateY(-3px) scale(1.01);
        box-shadow: 0 20px 40px -5px rgba(236, 72, 153, 0.5), var(--shadow-glow);
        border-right-color: var(--accent-color-light);
        border-color: var(--glass-border-light);
    }

    .result-item:nth-child(1) { border-right-color: #6366f1; }
    .result-item:nth-child(2) { border-right-color: #a855f7; }
    .result-item:nth-child(3) { border-right-color: #ec4899; }
    .result-item:nth-child(4) { border-right-color: #14b8a6; }
    .result-item:nth-child(5) { border-right-color: #3b82f6; }

    .result-item-header {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
        gap: 15px;
    }

    .result-item-icon {
        width: 50px;
        height: 50px;
        background: var(--primary-gradient);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        box-shadow: 0 5px 15px rgba(236, 72, 153, 0.3);    }

    .result-item-title {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text-color-primary);
        margin: 0;
    }

    .result-item-content {
        color: var(--text-color-secondary);
        line-height: 1.8;
        margin-bottom: 15px;
    }

    /* رابط القاموس */
    .dict-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 15px;
        color: var(--accent-color);
        text-decoration: none;
        font-weight: 600;
        border-bottom: 1px dashed var(--accent-color);
        transition: all 0.3s;
        padding: 5px 0;
    }

    .dict-link::after {
        content: '→';
        transition: transform 0.3s;
    }

    .dict-link:hover {
        color: #fff;
        border-bottom-color: #fff;
        transform: translateX(5px);
    }

    .dict-link:hover::after {
        transform: translateX(5px);
    }

    /* ============================================
       منطقة الملاحظات - Textarea
       ============================================ */
    textarea {
        width: 100%;
        background: rgba(0, 0, 0, 0.2);        border: 1px solid var(--glass-border);
        border-radius: 15px;
        color: #ddd;
        padding: 15px;
        font-family: inherit;
        margin-top: 10px;
        resize: vertical;
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
        transition: all 0.3s;
        min-height: 120px;
        font-size: 1rem;
        line-height: 1.6;
    }

    textarea::placeholder {
        color: var(--text-color-tertiary);
    }

    textarea:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: #a855f7;
        box-shadow: 0 0 20px rgba(168, 85, 247, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.1);
        outline: none;
    }

    textarea:hover {
        border-color: var(--glass-border-light);
        background: rgba(0, 0, 0, 0.25);
    }

    /* ============================================
       التذييل - Footer
       ============================================ */
    footer {
        margin-top: auto;
        padding: 30px 20px;
        color: var(--text-color-muted);
        font-size: 0.9rem;
        letter-spacing: 0.5px;
        text-align: center;
        width: 100%;
        border-top: 1px solid var(--glass-border-dark);
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
    }

    footer a {
        color: var(--accent-color);
        text-decoration: none;
        transition: all 0.3s;        position: relative;
    }

    footer a::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 1px;
        background: var(--accent-color);
        transition: width 0.3s;
    }

    footer a:hover {
        color: var(--accent-color-light);
    }

    footer a:hover::after {
        width: 100%;
    }

    .footer-links {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .social-links {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
    }

    .social-link {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-color-secondary);
        text-decoration: none;
        transition: all 0.3s;
        font-size: 1.2rem;    }

    .social-link:hover {
        background: var(--primary-gradient);
        border-color: transparent;
        color: #fff;
        transform: translateY(-5px) rotate(360deg);
        box-shadow: var(--shadow-glow);
    }

    /* ============================================
       الأزرار - Buttons
       ============================================ */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 24px;
        border: none;
        border-radius: var(--radius-lg);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        font-family: inherit;
        position: relative;
        overflow: hidden;
    }

    .btn-primary {
        background: var(--primary-gradient);
        color: #fff;
        box-shadow: 0 5px 15px var(--hover-glow);
    }

    .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px var(--hover-glow), 0 0 20px rgba(236, 72, 153, 0.4);
    }

    .btn-secondary {
        background: var(--glass-bg);
        color: var(--text-color-primary);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {        background: var(--glass-bg-light);
        border-color: var(--glass-border-light);
        transform: translateY(-2px);
    }

    .btn-success {
        background: var(--success-gradient);
        color: #fff;
    }

    .btn-warning {
        background: var(--warning-gradient);
        color: #fff;
    }

    .btn-danger {
        background: var(--danger-gradient);
        color: #fff;
    }

    .btn-outline {
        background: transparent;
        border: 2px solid var(--accent-color);
        color: var(--accent-color);
    }

    .btn-outline:hover {
        background: var(--accent-color);
        color: #fff;
        box-shadow: var(--shadow-glow);
    }

    .btn-lg {
        padding: 16px 32px;
        font-size: 1.1rem;
    }

    .btn-sm {
        padding: 8px 16px;
        font-size: 0.875rem;
    }

    /* ============================================
       البطاقات - Cards
       ============================================ */
    .card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-xl);        padding: 30px;
        box-shadow: var(--shadow-lg);
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-xl), var(--shadow-glow);
        border-color: var(--glass-border-light);
    }

    .card-header {
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid var(--glass-border-dark);
    }

    .card-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-color-primary);
        margin: 0;
    }

    .card-body {
        color: var(--text-color-secondary);
        line-height: 1.8;
    }

    .card-footer {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid var(--glass-border-dark);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* ============================================
       التحميل - Loading States
       ============================================ */
    .loader {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .loader-dots {
        display: flex;
        gap: 8px;
        justify-content: center;
    }

    .loader-dots span {
        width: 12px;
        height: 12px;
        background: var(--accent-color);
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite both;
    }

    .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loader-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }

    .skeleton {
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s ease-in-out infinite;
        border-radius: var(--radius-md);
    }

    @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    /* ============================================
       الشارات - Badges
       ============================================ */
    .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 12px;
        border-radius: var(--radius-full);
        font-size: 0.75rem;
        font-weight: 600;        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .badge-primary {
        background: rgba(99, 102, 241, 0.2);
        color: #6366f1;
        border: 1px solid rgba(99, 102, 241, 0.3);
    }

    .badge-success {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
        border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .badge-warning {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
        border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .badge-danger {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* ============================================
       النماذج - Forms
       ============================================ */
    .form-group {
        margin-bottom: 25px;
        text-align: right;
    }

    .form-label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-color-secondary);
        font-weight: 600;
        font-size: 0.9rem;
    }

    .form-label.required::after {
        content: ' *';
        color: var(--red);
    }

    .form-input {        width: 100%;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid var(--glass-border);
        border-radius: var(--radius-lg);
        color: var(--text-color-primary);
        font-size: 1rem;
        transition: all 0.3s;
        font-family: inherit;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--accent-color);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
    }

    .form-input:hover {
        border-color: var(--glass-border-light);
    }

    .form-input::placeholder {
        color: var(--text-color-tertiary);
    }

    .form-error {
        color: var(--red);
        font-size: 0.875rem;
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .form-success {
        color: var(--green);
        font-size: 0.875rem;
        margin-top: 6px;
    }

    /* ============================================
       القوائم - Lists
       ============================================ */
    .list-unstyled {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .list-item {
        padding: 12px 0;
        border-bottom: 1px solid var(--glass-border-dark);
        display: flex;
        align-items: center;
        gap: 15px;
        transition: all 0.3s;
    }

    .list-item:hover {
        background: rgba(255, 255, 255, 0.03);
        padding-right: 10px;
        border-radius: var(--radius-md);
    }

    .list-item:last-child {
        border-bottom: none;
    }

    .list-item-icon {
        width: 40px;
        height: 40px;
        background: var(--primary-gradient);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        flex-shrink: 0;
    }

    .list-item-content {
        flex: 1;
    }

    .list-item-title {
        font-weight: 600;
        color: var(--text-color-primary);
        margin-bottom: 3px;
    }

    .list-item-desc {
        font-size: 0.875rem;
        color: var(--text-color-tertiary);
    }

    /* ============================================
       التبويبات - Tabs
       ============================================ */
    .tabs {        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        border-bottom: 2px solid var(--glass-border-dark);
        padding-bottom: 10px;
    }

    .tab {
        padding: 12px 24px;
        background: transparent;
        border: none;
        color: var(--text-color-tertiary);
        font-weight: 600;
        cursor: pointer;
        border-radius: var(--radius-md) var(--radius-md) 0 0;
        transition: all 0.3s;
        position: relative;
        font-family: inherit;
        font-size: 1rem;
    }

    .tab::after {
        content: '';
        position: absolute;
        bottom: -12px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--primary-gradient);
        transition: width 0.3s;
    }

    .tab:hover {
        color: var(--text-color-secondary);
        background: rgba(255, 255, 255, 0.05);
    }

    .tab.active {
        color: var(--accent-color);
        background: rgba(236, 72, 153, 0.1);
    }

    .tab.active::after {
        width: 100%;
    }

    .tab-content {
        display: none;
        animation: fadeIn 0.4s ease;
    }
    .tab-content.active {
        display: block;
    }

    /* ============================================
       التنبيهات - Alerts
       ============================================ */
    .alert {
        padding: 16px 20px;
        border-radius: var(--radius-lg);
        margin-bottom: 20px;
        display: flex;
        align-items: flex-start;
        gap: 15px;
        border: 1px solid;
        backdrop-filter: blur(10px);
        animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .alert-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
    }

    .alert-content {
        flex: 1;
    }

    .alert-title {
        font-weight: 700;
        margin-bottom: 5px;
    }

    .alert-desc {
        font-size: 0.9rem;
        opacity: 0.9;
    }
    .alert-success {
        background: rgba(16, 185, 129, 0.1);
        border-color: rgba(16, 185, 129, 0.3);
        color: #10b981;
    }

    .alert-warning {
        background: rgba(245, 158, 11, 0.1);
        border-color: rgba(245, 158, 11, 0.3);
        color: #f59e0b;
    }

    .alert-danger {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.3);
        color: #ef4444;
    }

    .alert-info {
        background: rgba(59, 130, 246, 0.1);
        border-color: rgba(59, 130, 246, 0.3);
        color: #3b82f6;
    }

    /* ============================================
       النوافذ المنبثقة - Modals
       ============================================ */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(5px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: var(--z-modal);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
    }

    .modal-overlay.active {
        opacity: 1;
        visibility: visible;
    }

    .modal {        background: var(--glass-bg);
        backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-2xl);
        padding: 40px;
        max-width: 600px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        transform: scale(0.9) translateY(20px);
        transition: all 0.3s;
        box-shadow: var(--shadow-2xl);
    }

    .modal-overlay.active .modal {
        transform: scale(1) translateY(0);
    }

    .modal-header {
        margin-bottom: 25px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--glass-border-dark);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--text-color-primary);
    }

    .modal-close {
        background: none;
        border: none;
        color: var(--text-color-tertiary);
        font-size: 1.5rem;
        cursor: pointer;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
    }

    .modal-close:hover {
        background: rgba(255, 255, 255, 0.1);        color: var(--text-color-primary);
        transform: rotate(90deg);
    }

    .modal-body {
        color: var(--text-color-secondary);
        line-height: 1.8;
        margin-bottom: 25px;
    }

    .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        padding-top: 20px;
        border-top: 1px solid var(--glass-border-dark);
    }

    /* ============================================
       التلميحات - Tooltips
       ============================================ */
    .tooltip {
        position: relative;
        display: inline-block;
    }

    .tooltip::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%) translateY(-10px);
        background: rgba(0, 0, 0, 0.9);
        color: #fff;
        padding: 8px 16px;
        border-radius: var(--radius-md);
        font-size: 0.875rem;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
        pointer-events: none;
        z-index: var(--z-tooltip);
    }

    .tooltip::before {
        content: '';
        position: absolute;
        bottom: 100%;
        left: 50%;        transform: translateX(-50%) translateY(-5px);
        border: 8px solid transparent;
        border-top-color: rgba(0, 0, 0, 0.9);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
    }

    .tooltip:hover::after,
    .tooltip:hover::before {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
    }

    /* ============================================
       القوائم المنسدلة - Dropdowns
       ============================================ */
    .dropdown {
        position: relative;
        display: inline-block;
    }

    .dropdown-menu {
        position: absolute;
        top: 100%;
        right: 0;
        min-width: 200px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xl);
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.3s;
        z-index: var(--z-dropdown);
        margin-top: 10px;
    }

    .dropdown.active .dropdown-menu {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .dropdown-item {
        padding: 12px 20px;
        color: var(--text-color-secondary);        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s;
        cursor: pointer;
    }

    .dropdown-item:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-color-primary);
        padding-right: 25px;
    }

    .dropdown-divider {
        height: 1px;
        background: var(--glass-border-dark);
        margin: 8px 0;
    }

    /* ============================================
       شريط التقدم - Progress Bars
       ============================================ */
    .progress {
        height: 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-full);
        overflow: hidden;
        margin-bottom: 20px;
    }

    .progress-bar {
        height: 100%;
        background: var(--primary-gradient);
        border-radius: var(--radius-full);
        transition: width 0.6s ease;
        position: relative;
        overflow: hidden;
    }

    .progress-bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    /* ============================================
       التوستر - Toast Notifications
       ============================================ */
    .toast-container {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: var(--z-toast);
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .toast {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: 16px 20px;
        min-width: 300px;
        box-shadow: var(--shadow-xl);
        display: flex;
        align-items: center;
        gap: 15px;
        animation: toastSlideIn 0.4s ease;
        overflow: hidden;
        position: relative;
    }

    @keyframes toastSlideIn {
        from {
            opacity: 0;
            transform: translateX(-100%);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .toast.hiding {
        animation: toastSlideOut 0.4s ease forwards;
    }
    @keyframes toastSlideOut {
        from {
            opacity: 1;
            transform: translateX(0);
        }
        to {
            opacity: 0;
            transform: translateX(-100%);
        }
    }

    .toast::before {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: var(--primary-gradient);
        animation: toastProgress 3s linear forwards;
    }

    @keyframes toastProgress {
        from { width: 100%; }
        to { width: 0%; }
    }

    .toast-icon {
        font-size: 1.5rem;
    }

    .toast-content {
        flex: 1;
    }

    .toast-title {
        font-weight: 700;
        color: var(--text-color-primary);
        margin-bottom: 3px;
    }

    .toast-message {
        font-size: 0.875rem;
        color: var(--text-color-secondary);
    }

    .toast-close {
        background: none;
        border: none;
        color: var(--text-color-tertiary);
        cursor: pointer;        font-size: 1.2rem;
        padding: 0;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.3s;
    }

    .toast-close:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-color-primary);
    }

    /* ============================================
       التدرجات الإضافية - Additional Gradients
       ============================================ */
    .gradient-text {
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .gradient-bg {
        background: var(--primary-gradient);
    }

    .gradient-border {
        position: relative;
    }

    .gradient-border::before {
        content: '';
        position: absolute;
        inset: -2px;
        background: var(--primary-gradient);
        border-radius: inherit;
        z-index: -1;
        filter: blur(10px);
        opacity: 0.5;
    }

    /* ============================================
       التأثيرات الحركية - Animations
       ============================================ */
    .animate-fade-in {
        animation: fadeIn 0.6s ease;    }

    .animate-fade-in-up {
        animation: fadeInUp 0.6s ease;
    }

    .animate-fade-in-down {
        animation: fadeInDown 0.6s ease;
    }

    .animate-slide-in-left {
        animation: slideInLeft 0.6s ease;
    }

    .animate-slide-in-right {
        animation: slideInRight 0.6s ease;
    }

    .animate-scale-in {
        animation: scaleIn 0.4s ease;
    }

    .animate-bounce-in {
        animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideInLeft {
        from {            opacity: 0;
            transform: translateX(-50px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes slideInRight {
        from {
            opacity: 0;
            transform: translateX(50px);
        }
