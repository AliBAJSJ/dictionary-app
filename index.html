<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد كامبريدج الذكي</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; direction: rtl; }
        .card { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a237e; margin-bottom: 10px; }
        input { padding: 12px; width: 75%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 16px; }
        .search-btn { padding: 12px 25px; background: #1a237e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result-area { margin-top: 20px; text-align: right; padding: 15px; background: #f9f9f9; border-radius: 10px; border: 1px solid #eee; }
        .word-title { font-size: 26px; color: #d32f2f; font-weight: bold; display: block; }
        .cambridge-btn { 
            display: block; width: 100%; padding: 15px; margin-top: 20px; 
            background: #002e5d; color: #ffca28 !important; text-decoration: none; 
            border-radius: 10px; font-weight: bold; font-size: 16px; 
            border: 2px solid #ffca28; box-sizing: border-box;
        }
        .cambridge-btn:hover { background: #001f40; }
        .audio-btn { background: #4caf50; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>مساعد كامبريدج الذكي 🔎</h1>
        <p>البحث المباشر في قواميس كامبريدج المعتمدة</p>
        
        <input type="text" id="userInput" placeholder="اكتب الكلمة بالإنجليزية...">
        <button class="search-btn" onclick="getTranslation()">بحث</button>
        
        <div id="result-area" style="display: none;"></div>
    </div>

    <script>
        async function getTranslation() {
            const word = document.getElementById('userInput').value.trim().toLowerCase();
            const resultArea = document.getElementById('result-area');
            
            if (!word) { alert("يرجى إدخال كلمة"); return; }
            resultArea.style.display = "block";
            resultArea.innerHTML = "جاري جلب البيانات...";

            try {
                const response = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + word);
                const data = await response.json();

                // هذا هو الرابط الذي سيفتح صفحة الترجمة العربية في كامبريدج
                const cambridgeUrl = `https://dictionary.cambridge.org/dictionary/english-arabic/${word}`;

                if (data.title === "No Definitions Found") {
                    resultArea.innerHTML = `
                        <div style="color: red; margin-bottom: 10px;">لم نجد تعريفاً سريعاً، جرب القاموس الكامل:</div>
                        <a href="${cambridgeUrl}" target="_blank" class="cambridge-btn">فتح صفحة الترجمة في Cambridge</a>
                    `;
                } else {
                    const def = data[0].meanings[0].definitions[0].definition;
                    resultArea.innerHTML = `
                        <span class="word-title">${word.toUpperCase()}</span>
                        <div style="margin-top:10px;"><b>المعنى بالإنجليزي:</b><br>${def}</div>
                        <button class="audio-btn" onclick="playAudio('${word}')">🔊 استمع للنطق</button>
                        
                        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
                        
                        <a href="${cambridgeUrl}" target="_blank" class="cambridge-btn">
                             📖 عرض الترجمة العربية في Cambridge
                        </a>
                    `;
                }
            } catch (e) {
                resultArea.innerHTML = "⚠️ تأكد من الاتصال بالإنترنت.";
            }
        }

        function playAudio(word) {
            const utter = new SpeechSynthesisUtterance(word);
            utter.lang = 'en-US';
            window.speechSynthesis.speak(utter);
        }
    </script>
</body>
</html>
