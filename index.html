<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مساعد كامبريدج الذكي</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; direction: rtl; }
        .card { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a237e; }
        input { padding: 12px; width: 70%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 16px; }
        button { padding: 12px 20px; background: #1a237e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result-area { margin-top: 20px; text-align: right; padding: 15px; background: #f9f9f9; border-radius: 10px; min-height: 50px; border: 1px solid #eee; line-height: 1.6; }
        .word { font-size: 24px; color: #d32f2f; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>مساعد كامبريدج الذكي 🔎</h1>
        <p>اكتب كلمة بالإنجليزية واضغط بحث</p>
        <input type="text" id="userInput" placeholder="مثلاً: Success">
        <button onclick="getTranslation()">بحث الآن</button>
        <div id="result-area">النتائج ستظهر هنا...</div>
    </div>

    <script>
        async function getTranslation() {
            const word = document.getElementById('userInput').value.trim();
            const resultArea = document.getElementById('result-area');
            if (!word) { alert("يرجى كتابة كلمة أولاً"); return; }
            resultArea.innerHTML = "جاري جلب البيانات من القواميس الموثوقة...";

            try {
                const response = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + word);
                const data = await response.json();
                if (data.title === "No Definitions Found") {
                    resultArea.innerHTML = "❌ لم نجد الكلمة، تأكد من الإملاء.";
                } else {
                    const definition = data[0].meanings[0].definitions[0].definition;
                    const partOfSpeech = data[0].meanings[0].partOfSpeech;
                    resultArea.innerHTML = 
                        '<div class="word">' + word.toUpperCase() + '</div>' +
                        '<div><b>نوع الكلمة:</b> ' + partOfSpeech + '</div>' +
                        '<div style="margin-top:10px;"><b>المعنى بالإنجليزية:</b> ' + definition + '</div>' +
                        '<button onclick="playAudio()" style="background:#4CAF50; margin-top:15px; padding:8px 15px;">🔊 استمع للنطق</button>';
                }
            } catch (error) { resultArea.innerHTML = "⚠️ تأكد من الاتصال بالإنترنت."; }
        }

        function playAudio() {
            const word = document.getElementById('userInput').value;
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
